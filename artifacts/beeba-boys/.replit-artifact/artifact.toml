kind = "web"
previewPath = "/"
title = "Beeba Boys Barbershop"
version = "1.0.0"
id = "artifacts/beeba-boys"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22783

[services.development]
run = "pnpm --filter @workspace/beeba-boys run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beeba-boys", "run", "build" ]
publicDir = "artifacts/beeba-boys/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22783"
BASE_PATH = "/"
